name: deliveryapp
description: "Delivery App - Multi-role mobile application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management, DI, Routing
  get: ^4.6.6

  # Network
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # Local Storage
  get_storage: ^2.1.1
  flutter_secure_storage: ^9.0.0

  # UI & Animations
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.1.0
  carousel_slider: ^4.2.1

  # Charts
  fl_chart: ^0.66.0

  # Forms
  form_validator: ^2.1.1

  # Notifications
  onesignal_flutter: ^5.1.0

  # Utils
  intl: ^0.19.0
  dartz: ^0.10.1
  equatable: ^2.0.5
  url_launcher: ^6.2.4
  connectivity_plus: ^5.0.2
  image_picker: ^1.0.7
  flutter_slidable: ^3.0.1

  # WebView — عرض HTML فاتورة PDF
  webview_flutter: ^4.7.0

  # Real-time SignalR
  signalr_netcore: ^1.3.5

  # PDF generation & printing
  pdf: ^3.10.8
  printing: ^5.12.0
  path_provider: ^2.1.2
  share_plus: ^7.2.2

  # QR code
  qr_flutter: ^4.1.0

  # Maps (GPS for driver)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
